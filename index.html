<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凉山规范彝文检字编辑器</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script async defer src="https://buttons.github.io/buttons.js"></script>
</head>
<body>
    <div class="container">
        <div class="input-section">
            <div class="editor-header">
                <div class="title-group">
                    <h2><span class="yi-logo">ꃚꎹ</span><span class="title-latin"> | FUSHEP</span></h2>
                    <span class="subtitle" data-i18n="subtitle">凉山规范彝文检字编辑器</span>
                    <span class="subtitle">v0.1.4</span>
                </div>
                <div class="header-controls">
                    <div class="controls-row-top">
                        <select id="lang-selector" onchange="setLanguage(this.value)">
                            <option value="zh-CN" lang="zh-CN">简体中文</option>】
                            <option value="zh-TW" lang="zh-TW">繁體中文</option>
                            <option value="en" lang="en">English</option>
                            <option value="ja" lang="ja">日本語</option>
                            <option value="ko" lang="ko">한국어</option>
                            <option value="ii" lang="ii">ꆈꌠ꒿(ꎕꏦ)</option>
                            <option value="za" lang="za">Vahcuengh</option>
                        </select>
                    
                        <button id="copy-btn" class="copy-btn" data-i18n="copy_btn">📋 复制文本</button>
                    </div>

                    <div class="controls-row-bottom">
                        <div class="star-align-wrapper">
                            <span class="star-me-caption" data-i18n="star_me"></span>
                            <a class="github-button" 
                                href="https://github.com/KotobaTrilius/nuosu-fushep" 
                                data-icon="octicon-star" 
                                data-size="large"
                                data-show-count="true">
                                Star
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <textarea id="editor" data-i18n="editor_placeholder" placeholder="在此处输入或点击下方按钮插入字符..."></textarea>
            <div id="transliteration-display" class="transliteration-box">
                <span class="trans-label" data-i18n="trans_label">拼音转写:</span> 
                <span id="trans-content"></span>
            </div>
        </div>

        
        <div class="controls-row">
            <div class="tabs">
                <button class="tab-btn active" data-i18n="tab_radical" data-mode="radical">部首检字</button>
                <button class="tab-btn" data-i18n="tab_stroke" data-mode="stroke">笔画检字</button>
                <button class="tab-btn" data-i18n="tab_pinyin" data-mode="pinyin">拉丁转写检字</button>
            </div>

            <div id="info-display" class="info-box" data-i18n="info_default">
                悬停在字符上查看详细信息
            </div>
        </div>
        
        <div class="workspace">
            <div id="panel-radical" class="mode-panel active">
                <div class="side-bar">
                    <h3 data-i18n="radical_select_title">选择部首</h3>
                    <div id="radical-buttons"></div>
                </div>
                <div class="main-content">
                    <h3><span data-i18n="radical_list_title">字符列表</span> (<span id="current-radical-name" data-i18n="radical_no_selection">未选择</span>)</h3>
                    <div id="radical-char-buttons" class="char-grid"></div>
                </div>
            </div>

            
            <div id="panel-stroke" class="mode-panel">
                <div class="side-bar">
                    <h3 data-i18n="stroke_input_title">笔画输入</h3>
                    <div id="stroke-input-display" class="stroke-display"></div>
                    <button id="clear-stroke-btn" class="action-btn" data-i18n="stroke_clear_btn">清空笔画 (Esc)</button>
                    
                    <h4 data-i18n="stroke_keyboard_title">笔画键盘</h4>
                    <div id="stroke-keyboard" class="stroke-grid">
                        
                    </div>
                </div>
                <div class="main-content">
                    <h3><span data-i18n="stroke_match_title">匹配字符</span> (<span id="match-count">0</span> <span data-i18n="stroke_count_suffix">个</span>)</h3>
                    <div id="stroke-char-buttons" class="char-grid">
                        <p class="hint" data-i18n="stroke_hint">请输入笔画以筛选字符</p>
                    </div>
                </div>
            </div>


            <div id="panel-pinyin" class="mode-panel">
                <div class="side-bar">
                    <h3 data-i18n="pinyin_input_title">转写输入</h3>
                    <input type="text" id="pinyin-input" class="pinyin-input-box" data-i18n-placeholder="pinyin_placeholder">
                    <button id="clear-pinyin-btn" class="action-btn" data-i18n="pinyin_clear_btn">清空 (Esc)</button>
                </div>
                <div class="main-content">
                    <h3><span data-i18n="pinyin_match_title">匹配字符</span> (<span id="pinyin-match-count">0</span> <span data-i18n="stroke_count_suffix">个</span>)</h3>
                    <div id="pinyin-char-buttons" class="char-grid">
                        <p class="hint" data-i18n="pinyin_hint">输入拉丁转写以筛选字符</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
    <script src="data_chars.js"></script>
    <script src="phonetics.js"></script>
    <script src="lang.js"></script>
    <script src="init.js"></script>
    <script src="radicals.js"></script>
    <script src="strokes.js"></script>
    <script src="pinyin.js"></script>
</body>
</html>
